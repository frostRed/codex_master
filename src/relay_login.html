<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay Login</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --ink: #1f2a1d;
        --muted: #5f6a5d;
        --line: #c9bea9;
        --accent: #2d6a4f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(45, 106, 79, 0.14), transparent 38%),
          radial-gradient(circle at bottom right, rgba(33, 54, 39, 0.14), transparent 30%),
          linear-gradient(180deg, #f9f5ee 0%, #ece3d4 100%);
      }
      .card {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 20px 44px rgba(54, 47, 36, 0.12);
        padding: 22px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.4;
      }
      label {
        display: block;
        margin: 10px 0 6px;
        color: var(--muted);
      }
      input, button {
        width: 100%;
        font: inherit;
      }
      input {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: #fff;
      }
      button {
        margin-top: 14px;
        border: 0;
        border-radius: 999px;
        padding: 11px 14px;
        background: var(--accent);
        color: #f6fbf8;
        cursor: pointer;
      }
      .error {
        margin-top: 10px;
        min-height: 1.2em;
        color: #9d3e36;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Relay Login</h1>
      <p>Sign in to access the relay console.</p>
      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit">Sign in</button>
        <div class="error" id="error"></div>
      </form>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const error = document.getElementById("error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const response = await fetch("/auth/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (response.ok) {
          window.location.href = "/";
          return;
        }

        const text = await response.text();
        error.textContent = text || "Login failed";
      });
    </script>
  </body>
</html>
